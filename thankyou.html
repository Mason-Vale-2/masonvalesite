<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Mason Vale</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/assets/index-BC3_1p2a.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; font-family: Inter,sans-serif; min-height: 100vh; }
    .loader {
      border: 4px solid #eee;
      border-top: 4px solid #f4c02c;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body style="min-height: 100vh;">
  <main class="min-h-screen w-full flex items-center justify-center relative fade-bg" style="background: url('/hero-background.png') center center/cover no-repeat fixed;">
    <div class="max-w-2xl w-1/2 h-[80vh] bg-white bg-opacity-90 rounded-2xl shadow-2xl py-12 px-8 flex flex-col items-center text-center relative mx-4" style="min-width:350px;backdrop-filter: blur(3.8px);">
      <h1 class="font-serif text-4xl font-semibold mb-6 text-black">Thank You</h1>
      <p class="text-lg text-gray-700 mb-1">Your submission has been received.</p>
      <p class="text-base text-gray-600 mb-8">We will be in touch shortly to discuss your project.</p>
      <div class="flex flex-col items-center mt-8">
        <span class="text-base text-gray-500 mb-4">Redirecting...</span>
        <span class="loader"></span>
      </div>
    </div>
  </main>
  <script>
    setTimeout(function() {
      window.location.href = "https://www.mason-vale.com/";
    }, 5000);
  </script>
</body>
</html>

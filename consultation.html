<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Free Consultation | Mason Vale</title>
  <meta name="description" content="Book a free consultation with Mason Vale. Luxury construction and renovation experts. Submit your project details and we’ll be in touch.">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/assets/index-BC3_1p2a.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; font-family: Inter, sans-serif; min-height: 100vh; }
    .fade-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(17,19,24,.62);
      z-index: 1;
      pointer-events: none;
    }
    .fade-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 2;
      pointer-events: none;
    }
    .consult-form { z-index: 10; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .input-field {
      background: rgba(255,255,255,0.96);
      border-radius: 0.5rem;
      border: 1px solid #e5e7eb;
      padding: 0.85rem 1.1rem;
      font-size: 1rem;
      margin-bottom: 1.1rem;
      width: 100%;
    }
    .input-field:focus { outline: 2px solid #f4c02c; }
    .btn-submit {
      font-family: 'Playfair Display', serif;
      background: #f4c02c;
      color: #181818;
      padding: 0.95rem 2.7rem;
      border-radius: 9999px;
      font-size: 1.08rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.10);
      margin-top: 0.4rem;
      transition: background 0.22s, color 0.22s;
    }
    .btn-submit:hover { background: #fed444; }
    @media (max-width: 600px) {
      h1 { font-size: 2.1rem; }
      form { padding: 1.2rem; }
    }
  </style>
</head>
<body style="min-height: 100vh;">
  <main class="min-h-screen w-full flex items-center justify-center relative fade-bg" style="background: url('/hero-background.png') center center/cover no-repeat fixed;">
    <form class="consult-form max-w-2xl w-1/2 h-[80vh] bg-white bg-opacity-80 rounded-2xl shadow-2xl py-12 px-8 flex flex-col items-center text-center relative mx-4" style="min-width:350px;" action="https://formspree.io/f/meeoykkk" method="POST" autocomplete="off">
      <input type="hidden" name="_redirect" value="https://www.mason-vale.com/thankyou.html">
      <h1 class="font-serif text-3xl md:text-5xl font-semibold mb-8 text-black">Book a Free Consultation</h1>
      <p class="text-lg md:text-xl text-gray-700 mb-12 font-medium">Give us your details and we’ll contact you to discuss your project.</p>
      <div class="w-full flex flex-col text-left">
        <label for="name" class="text-base font-medium mb-1">Full name<span class="text-gold-500">*</span></label>
        <input class="input-field" type="text" id="name" name="name" required autocomplete="off">
        <label for="phone" class="text-base font-medium mb-1">Phone number<span class="text-gold-500">*</span></label>
        <input class="input-field" type="tel" id="phone" name="phone" required pattern="[0-9\-\+\s]+" autocomplete="off">
        <label for="email" class="text-base font-medium mb-1">Email address<span class="text-gold-500">*</span></label>
        <input class="input-field" type="email" id="email" name="email" required autocomplete="off">
        <label for="postcode" class="text-base font-medium mb-1">Postcode</label>
        <input class="input-field" type="text" id="postcode" name="postcode" autocomplete="off">
        <label for="message" class="text-base font-medium mb-1">Project details<span class="text-gold-500">*</span></label>
        <textarea class="input-field" id="message" name="message" required rows="4" placeholder="Tell us about your project..." autocomplete="off"></textarea>
      </div>
      <button class="btn-submit mt-16 transition" type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
